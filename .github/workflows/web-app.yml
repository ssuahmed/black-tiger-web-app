name: Web App

on:
  pull_request:
  push:
    branches: [main, master, develop]

defaults:
  run:
    working-directory: .

jobs:
  unit-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: node --test tests/**/*.test.mjs
      - run: npm run build
